apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: devops-agent-platform
data:
  DATABASE_URL: "sqlite+aiosqlite:///./data/devops_agent.db"
  REDIS_URL: "redis://redis-service:6379/0"
  OLLAMA_URL: "http://ollama-service:11434"
  ALGORITHM: "HS256"
  ACCESS_TOKEN_EXPIRE_MINUTES: "1440"
  OLLAMA_MODEL: "llama3"
  OLLAMA_CODE_MODEL: "codellama"
  EMBEDDING_MODEL: "all-MiniLM-L6-v2"
  VECTOR_STORE_PATH: "./faiss_index"
  LOG_LEVEL: "INFO"
  CORS_ORIGINS: "http://frontend-service:3000"
